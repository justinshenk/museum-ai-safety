<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Two diverging bars: reward rising, reality falling">
  <rect width="320" height="200" fill="#fafbfc"/>
  <rect x="0.5" y="0.5" width="319" height="199" fill="none" stroke="#0c1118" stroke-opacity="0.12"/>
  <text x="24" y="34" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="2" fill="#1f4dff">REWARD HACKING</text>
  <!-- proxy reward: rising -->
  <polyline points="24,150 100,120 176,86 252,52 296,40" fill="none" stroke="#1f4dff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="296" cy="40" r="4" fill="#1f4dff"/>
  <text x="232" y="34" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#1f4dff">proxy</text>
  <!-- true objective: rises then collapses -->
  <polyline points="24,150 100,118 176,96 252,132 296,168" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 5"/>
  <circle cx="296" cy="168" r="4" fill="#dc2626"/>
  <text x="232" y="186" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#dc2626">reality</text>
</svg>
